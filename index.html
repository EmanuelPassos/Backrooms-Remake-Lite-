<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKROOMS - MANUTENÇÃO</title>
    <style>
        :root { --y: #ceb26b; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Courier New', monospace; 
            display: flex; align-items: center; justify-content: center;
            color: var(--y); text-align: center;
        }

        .container { padding: 20px; }

        /* EFEITO GLITCH NO TÍTULO */
        .glitch-title { 
            font-size: 3rem; 
            font-weight: 900; 
            letter-spacing: 15px; 
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            animation: g 0.3s infinite; 
            text-shadow: 2px 0 #f00, -2px 0 #00f; 
        }

        @keyframes g { 
            0%, 100% { transform: translate(0); } 
            33% { transform: translate(-3px, 2px); } 
            66% { transform: translate(3px, -2px); } 
        }

        /* DESCRIÇÃO */
        .description {
            margin-top: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 600px;
            letter-spacing: 2px;
            opacity: 0.8;
            border-top: 1px solid rgba(206,178,107,0.3);
            padding-top: 20px;
        }

        .blink { animation: blinker 1.5s linear infinite; color: #fff; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch-title">BACKROOMS</div>
        
        <div class="description">
            <p>O JOGO ESTÁ FORA DO AR POR ESTAR SENDO UMA GRANDE ATUALIZAÇÃO.</p>
            <p>GRÁFICOS MELHORADOS E GAMEPLAY IMERSIVA.</p>
            <p class="blink">ESPERE QUE AINDA HOJE ATUALIZA.</p>
        </div>
    </div>

</body>
</html>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>

    <script>
        const canvas = document.getElementById("renderCanvas");
        // Optimização de engine para 60fps
        const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: false, stencil: false });
        const scene = new BABYLON.Scene(engine);
        let active = false;
        let mv = { x: 0, z: 0 };
        let joyId = null;

        scene.ambientColor = new BABYLON.Color3(0.3, 0.25, 0.1);
        scene.gravity = new BABYLON.Vector3(0, -0.15, 0);
        scene.collisionsEnabled = true;
        scene.blockfreezing = true; // Ganho de performance

        const cam = new BABYLON.FreeCamera("cam", new BABYLON.Vector3(0, 1.8, 0), scene);
        cam.attachControl(canvas, true);
        cam.minZ = 0.15;
        cam.checkCollisions = true;
        cam.applyGravity = true;
        cam.ellipsoid = new BABYLON.Vector3(0.4, 0.9, 0.4);
        cam.angularSensibility = 2500;
        cam.inertia = 0.8;

        const flashlight = new BABYLON.SpotLight("fl", BABYLON.Vector3.Zero(), new BABYLON.Vector3(0,0,1), 0.8, 2, scene);
        flashlight.parent = cam;
        flashlight.intensity = 0;
        flashlight.diffuse = new BABYLON.Color3(1, 1, 0.85);

        const wallMat = new BABYLON.StandardMaterial("w", scene);
        wallMat.diffuseColor = new BABYLON.Color3(0.8, 0.72, 0.35);
        wallMat.freeze(); // Otimiza material estático

        const lightMat = new BABYLON.StandardMaterial("l", scene);
        lightMat.emissiveColor = new BABYLON.Color3(1, 0.95, 0.6);
        lightMat.freeze();

        const chunks = new Map();
        const draw = (x, z) => {
            const node = new BABYLON.TransformNode("n");
            const s = 14; const h = 8;
            
            const f = BABYLON.MeshBuilder.CreateBox("f", {width:s, height:0.2, depth:s}, scene);
            f.position.set(x*s, 0, z*s); f.material = wallMat; f.checkCollisions = true; f.parent = node;
            f.freezeWorldMatrix(); // Não recalcula posição

            const c = BABYLON.MeshBuilder.CreateBox("c", {width:s, height:0.2, depth:s}, scene);
            c.position.set(x*s, h, z*s); c.material = wallMat; c.parent = node;
            c.freezeWorldMatrix();

            const lamp = BABYLON.MeshBuilder.CreatePlane("lp", {width: 2.5, height: 1.2}, scene);
            lamp.position.set(x*s, h - 0.05, z*s); lamp.rotation.x = Math.PI/2; lamp.material = lightMat; lamp.parent = node;
            lamp.freezeWorldMatrix();

            const pl = new BABYLON.PointLight("pl", new BABYLON.Vector3(x*s, h-1.5, z*s), scene);
            pl.intensity = 0.35; pl.range = 22; pl.diffuse = new BABYLON.Color3(1, 0.85, 0.5);
            
            if (Math.random() > 0.4) {
                const w = BABYLON.MeshBuilder.CreateBox("w", {width: s, height: h, depth: 1.2}, scene);
                w.position.set(x*s, h/2, z*s + 6.4); w.material = wallMat; w.checkCollisions = true; w.parent = node;
                w.freezeWorldMatrix();
            }
            return node;
        };

        function iniciarTudo() {
            document.getElementById('ui-master').style.display = 'none';
            // Pré-geração das 100 salas
            for(let i = -5; i <= 5; i++) for(let j = -5; j <= 5; j++) {
                const id = i+"_"+j; if (!chunks.has(id)) chunks.set(id, draw(i, j));
            }
            const intro = document.getElementById('intro');
            const msg = document.getElementById('msg');
            intro.style.display = 'flex';
            const steps = ["EMANUEL APRESENTA", "BACKROOMS REMAKE LITE"];
            let cur = 0;
            const next = () => {
                if(cur < steps.length) {
                    msg.innerText = steps[cur]; msg.style.opacity = 1;
                    setTimeout(() => { msg.style.opacity = 0; cur++; setTimeout(next, 1000); }, 2000);
                } else {
                    intro.style.display = 'none'; canvas.style.display = 'block';
                    document.getElementById('hud').style.display = 'block';
                    document.getElementById('joy-zone').style.display = 'block';
                    flashlight.intensity = 3.0; active = true;
                }
            };
            next();
        }

        const knob = document.getElementById('joy-knob');
        const zone = document.getElementById('joy-zone');

        zone.addEventListener('touchstart', (e) => {
            if (joyId === null) {
                joyId = e.changedTouches[0].identifier;
                updateJoy(e.changedTouches[0]);
                cam.detachControl(canvas);
            }
        }, {passive: false});

        zone.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === joyId) {
                    updateJoy(t);
                    e.preventDefault();
                }
            }
        }, {passive: false});

        zone.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === joyId) {
                    joyId = null;
                    mv = { x: 0, z: 0 };
                    knob.style.transform = 'translate(0,0)';
                    cam.attachControl(canvas, true);
                }
            }
        });

        function updateJoy(t) {
            const rect = zone.getBoundingClientRect();
            let dx = (t.clientX - (rect.left + rect.width/2)) / (rect.width/2);
            let dy = (t.clientY - (rect.top + rect.height/2)) / (rect.height/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 1) { dx /= dist; dy /= dist; }
            knob.style.transform = `translate(${dx*35}px, ${dy*35}px)`;
            mv = { x: dx, z: -dy };
        }

        scene.onPointerDown = (evt) => {
            if (evt.x > window.innerWidth / 2) cam.attachControl(canvas, true);
        };

        scene.onBeforeRenderObservable.add(() => {
            if (!active) return;
            const walkSpeed = 0.038; 
            const f = cam.getDirection(BABYLON.Vector3.Forward());
            const r = cam.getDirection(BABYLON.Vector3.Right());
            if(mv.x !== 0 || mv.z !== 0) {
                cam.cameraDirection.addInPlace(new BABYLON.Vector3(
                    (f.x * mv.z + r.x * mv.x) * walkSpeed, 0, (f.z * mv.z + r.z * mv.x) * walkSpeed
                ));
            }
            // Loop infinito otimizado
            const px = Math.round(cam.position.x / 14);
            const pz = Math.round(cam.position.z / 14);
            for(let i=px-1; i<=px+1; i++) for(let j=pz-1; j<=pz+1; j++) {
                if (!chunks.has(i+"_"+j)) chunks.set(i+"_"+j, draw(i, j));
            }
        });

        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
